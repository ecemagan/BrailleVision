<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrailleVision</title>
  <!-- Office.js – required for Word communication -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>

  <!-- Background effects -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="wrapper">

    <!-- ── Header ─────────────────────────────────── -->
    <header>
      <div class="logo">Braille<span>Vision</span></div>
      <div class="tagline">Convert mathematical expressions and text to Braille</div>
    </header>

    <!-- ── Backend status indicator ──────────────── -->
    <div class="status-bar" id="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Checking backend connection...</span>
    </div>

    <!-- ── Action buttons ─────────────────────────── -->
    <div>
      <div class="section-label">Selected text</div>
      <div class="action-group">

        <button class="action-btn primary" id="btn-alpha" title="Converts the selected text to Grade 1 Braille">
          <span class="icon">📄</span>
          <div class="action-btn-inner">
            <span class="label">Convert text to Braille</span>
            <span class="sublabel">Selected text → Grade 1 Braille</span>
          </div>
        </button>

        <button class="action-btn secondary" id="btn-math" title="Converts the selected mathematical expression to Nemeth Braille">
          <span class="icon">🔢</span>
          <div class="action-btn-inner">
            <span class="label">Convert math to Nemeth Braille</span>
            <span class="sublabel">Supports sqrt, log, ln, sin, x^2, abs...</span>
          </div>
        </button>

      </div>
    </div>

    <div>
      <div class="section-label">Entire document</div>
      <div class="action-group">

        <button class="action-btn" id="btn-doc" title="Converts the entire document text to Braille">
          <span class="icon">📋</span>
          <div class="action-btn-inner">
            <span class="label">Convert entire document</span>
            <span class="sublabel">All text → Braille</span>
          </div>
        </button>

      </div>
    </div>

    <!-- ── Loading ─────────────────────────────────── -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Converting...</span>
    </div>

    <!-- ── Results area ───────────────────────────── -->
    <div id="result-area"></div>

  </div><!-- /wrapper -->

  <script src="taskpane.js"></script>
</body>
</html>
